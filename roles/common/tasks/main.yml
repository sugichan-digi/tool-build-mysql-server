---
# ============================================================
# 1. ファイアウォールの設定 (クラウド環境向け)
# ============================================================
# クラウド基盤側（AWSやVPSのコントロールパネル等）でファイアウォールを管理することを前提とし、
# サーバーOS内の firewalld は無効化・停止しておく。
- name: OSのファイアウォール(firewalld)を停止し、自動起動も無効化する
  service:
    name: firewalld
    state: stopped
    enabled: no
